<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mambo Boats</title>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>

<body>

    <header class="custom-header">
        <nav class="navbar navbar-expand-lg">
            <div class="container">

                <a class="navbar-brand" href="https://mamboboats.com/">
                    <img class="logo" src="img/logo_llarg.png" alt="Mambo Boats">
                </a>

                <button class="navbar-toggler custom-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false"
                    aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse justify-content-end" id="mainNavbar">
                    <div class="navbar-nav align-items-lg-center gap-lg-5 gap-3 mt-4 mt-lg-0">

                        <div class="lang-switch d-flex gap-3 justify-content-center">
                            <span onclick="setLang('ca')">CAT</span>
                            <span onclick="setLang('en')">EN</span>
                            <span onclick="setLang('es')">ESP</span>
                        </div>

                        <a href="tel:+34656364938" class="phone text-center">
                            (+34) 656 364 938
                        </a>

                        <a href="https://www.instagram.com/mamboboats/" class="icon text-center" target="_blank">
                            <i class="fab fa-instagram fs-2"></i>
                        </a>

                    </div>
                </div>

            </div>
        </nav>
    </header>

    <section class="hero d-flex align-items-center text-center">
        <div class="container">

            <h1 class="text-white mb-3" data-es="Descubre la Costa Brava con nosotros"
                data-en="Discover the Costa Brava with us" data-ca="Descobreix la Costa Brava amb nosaltres">
            </h1>

            <a href="#nauticmanager" class="hero-btn" data-es="Reservar"
                data-en="Book a boat" data-ca="Reservar">
            </a>
            <!--a href="#" class="mt-3 hero-btn" data-es="Volvemos muy pronto!" data-en="We'll be back very soon!"
                data-ca="Tornem molt aviat!">
            </a-->
        </div>
    </section>

    <section id="nauticmanager">
        <iframe name='' src='https://shop.nauticmanager.com/mambo-boats' scrolling='yes' height='900px' width='100%' frameborder='0'></iframe>
    </section>

    <!-- JS -->
    <script src="script.js"></script>

</body>

</html>
