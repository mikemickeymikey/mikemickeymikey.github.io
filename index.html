<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mambo Boats</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>

<body>

    <header class="custom-header">
        <div class="container d-flex justify-content-between align-items-center">

            <!-- Logo -->
            <img class="logo" src="img/logo_llarg.png" alt="Mambo Boats">

            <!-- Right -->
            <div class="d-flex align-items-center gap-5 fs-4">
                <div class="lang-switch d-flex gap-3">
                    <span onclick="setLang('ca')">CAT</span>
                    <span onclick="setLang('en')">EN</span>
                    <span onclick="setLang('es')">ESP</span>
                </div>
                <a href="tel:+34656364938" class="phone">(+34) 656 364 938</a> 
                <a href="https://www.instagram.com/mamboboats/" class="icon">
                    <i class="fab fa-instagram fs-2 align-middle"></i>
                </a>
            </div>

        </div>
    </header>

    <section class="hero d-flex align-items-center text-center">
        <div class="container">

            <h1 class="text-white mb-3" data-es="Descubre la Costa Brava con nosotros"
                data-en="Discover the Costa Brava with us" data-ca="Descobreix la Costa Brava amb nosaltres">
            </h1>

            <!--a href="#" class="mt-3 hero-btn">
                <i class="fas fa-arrow-right align-middle"></i>Reserva con nuestro Nautic Manager
            </a-->
            <a href="#" class="mt-3 hero-btn" data-es="Volvemos muy pronto!" data-en="We'll be back very soon!"
                data-ca="Tornem molt aviat!">
            </a>

        </div>
    </section>

    <!-- JS -->
    <script src="script.js"></script>

</body>

</html>
