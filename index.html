<!DOCTYPE html>

<head>

    <title>Mambo Boats</title>
    <link rel="icon" type="image/png" href="img/icon.png">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

                </button>

                <div class="collapse navbar-collapse justify-content-end" id="mainNavbar">

                        <div class="lang-switch d-flex gap-3 justify-content-center">

                        <a href="tel:+34611490585" class="phone text-center">

                            </a>

                            <a href="#" class="icon text-center" target="_blank">

                            </a>

                        </div>

                    </div>
                </div>

            </div>

    <section class="hero d-flex flex-column text-center">

        <div class="container d-flex flex-column justify-content-center align-items-center mb-5">

            <h1 class="text-white mb-3 titol" data-es="Descubre la Costa Brava con nosotros"
                data-en="Discover the Costa Brava with us" data-ca="Descobreix la Costa Brava amb nosaltres">
            </h1>

            <a href="#nauticmanager" class="hero-btn" data-es="Reservar" data-en="Book a boat" data-ca="Reservar">
            </a>

        </div>

        <!-- BOTTOM -->
        <div class="container mt-5 subtitol">

            <h2 class="text-white mt-3 mt-md-5" data-es="Alquiler de embarcaciones en Palamós"

            <p class="text-white hero-description mt-3 mt-md-5"

                data-ca="Gaudeix de la Costa Brava al teu ritme, descobrint cales úniques i aigües cristal·lines amb la tranquil·litat d’estar en bones mans.">
            </p>

        </div>

    </section>

    <section id="nauticmanager">
        <iframe name='' src='https://shop.nauticmanager.com/mambo-boats' scrolling='yes' height='900px' width='100%'

    <a href="https://wa.me/34611490585" class="whatsapp-btn" target="_blank">
